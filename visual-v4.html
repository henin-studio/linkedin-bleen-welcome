<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=1080">
  <title>Visual v4 — Deco Circles — Bleen x Denis Henin</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;700;800&display=block" rel="stylesheet">
  <style>
    *, *::before, *::after {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    html, body {
      width: 1080px;
      height: 1080px;
      overflow: hidden;
      background: #0D2B1E;
      font-family: 'Plus Jakarta Sans', sans-serif;
    }

    /* Noise texture overlay */
    body::before {
      content: '';
      position: absolute;
      inset: 0;
      background-image: repeating-conic-gradient(
        rgba(255, 255, 255, 0.03) 0%,
        transparent 0.0001%,
        transparent 25%,
        rgba(255, 255, 255, 0.03) 25.0001%
      );
      background-size: 4px 4px;
      pointer-events: none;
      z-index: 10;
    }

    /* Deco circles */
    .deco-circle-1 {
      position: absolute;
      top: -200px;
      right: -200px;
      width: 600px;
      height: 600px;
      border-radius: 50%;
      border: 2px solid rgba(30, 232, 160, 0.1);
    }

    .deco-circle-2 {
      position: absolute;
      bottom: -100px;
      left: -150px;
      width: 400px;
      height: 400px;
      border-radius: 50%;
      border: 1.5px solid rgba(30, 232, 160, 0.06);
    }

    .deco-circle-3 {
      position: absolute;
      top: 50%;
      right: -80px;
      transform: translateY(-50%);
      width: 250px;
      height: 250px;
      border-radius: 50%;
      border: 1px solid rgba(30, 232, 160, 0.08);
    }

    .deco-circle-4 {
      position: absolute;
      top: 80px;
      left: 60px;
      width: 180px;
      height: 180px;
      border-radius: 50%;
      background: rgba(30, 232, 160, 0.03);
    }

    /* Header — top-left */
    .li-header {
      position: absolute;
      top: 60px;
      left: 60px;
      z-index: 2;
    }

    .li-logo {
      font-size: 42px;
      font-weight: 800;
      color: #1EE8A0;
      letter-spacing: -0.03em;
      line-height: 1;
    }

    .li-tagline {
      font-size: 14px;
      font-weight: 400;
      color: rgba(255, 255, 255, 0.35);
      letter-spacing: 0.04em;
      margin-top: 6px;
    }

    /* Center-left content, vertically centered */
    .li-content {
      position: absolute;
      top: 0;
      bottom: 0;
      left: 0;
      right: 0;
      display: flex;
      flex-direction: column;
      justify-content: center;
      padding: 0 70px;
      z-index: 2;
    }

    .li-context {
      font-size: 14px;
      font-weight: 500;
      color: rgba(255, 255, 255, 0.4);
      text-transform: uppercase;
      letter-spacing: 0.14em;
      margin-bottom: 24px;
    }

    .li-name {
      font-size: 56px;
      font-weight: 800;
      color: #ffffff;
      letter-spacing: -0.02em;
      line-height: 1.05;
    }

    .li-title {
      font-size: 28px;
      font-weight: 600;
      color: #1EE8A0;
      margin-top: 12px;
      line-height: 1.2;
    }

    .li-sep {
      width: 80px;
      height: 2px;
      background: #1EE8A0;
      border-radius: 4px;
      margin: 30px 0;
    }

    .li-description {
      font-size: 20px;
      font-weight: 400;
      color: rgba(255, 255, 255, 0.5);
      max-width: 500px;
      line-height: 1.6;
    }

    /* Footer — bottom */
    .li-footer {
      position: absolute;
      bottom: 60px;
      left: 60px;
      right: 60px;
      z-index: 2;
      display: flex;
      justify-content: flex-end;
      align-items: center;
    }

    .li-website {
      font-size: 15px;
      font-weight: 400;
      color: rgba(255, 255, 255, 0.3);
      text-transform: uppercase;
      letter-spacing: 0.08em;
    }
  </style>
</head>
<body>

  <!-- Deco circles -->
  <div class="deco-circle-1"></div>
  <div class="deco-circle-2"></div>
  <div class="deco-circle-3"></div>
  <div class="deco-circle-4"></div>

  <!-- Header -->
  <div class="li-header">
    <div class="li-logo">bleen</div>
    <div class="li-tagline">Sustainability Consulting</div>
  </div>

  <!-- Center content -->
  <div class="li-content">
    <div class="li-context">Nouvelle recrue</div>
    <div class="li-name">Denis Henin</div>
    <div class="li-title">Graphic Designer</div>
    <div class="li-sep"></div>
    <div class="li-description">Le design au service de la durabilité et de la clarté.</div>
  </div>

  <!-- Footer -->
  <div class="li-footer">
    <div class="li-website">bleen.be</div>
  </div>

</body>
</html>

<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Bleen Welcome — v12</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;700;800&display=block" rel="stylesheet">
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    html, body {
      width: 1080px;
      height: 1080px;
      overflow: hidden;
      background: #0D2B1E;
      font-family: 'Plus Jakarta Sans', sans-serif;
    }

    .canvas {
      width: 1080px;
      height: 1080px;
      overflow: hidden;
      display: flex;
      align-items: center;
      justify-content: center;
      background: #0D2B1E;
    }

    /* 3×2 grid — 3 × 350px + 2 × 10px gap = 1070px wide, 2 × 530px + 1 × 10px = 1070px tall */
    .team-grid {
      display: grid;
      grid-template-columns: repeat(3, 350px);
      grid-template-rows: repeat(2, 530px);
      gap: 10px;
    }

    /* Photo cells */
    .cell {
      position: relative;
      overflow: hidden;
      background-size: cover;
      background-repeat: no-repeat;
    }

    /* Bottom gradient to soften photo edges against dark gaps */
    .cell--photo::after {
      content: '';
      position: absolute;
      inset: 0;
      background: linear-gradient(transparent 70%, rgba(13, 43, 30, 0.5) 100%);
      pointer-events: none;
    }

    /* Individual photo positions */
    .cell--ode {
      background-image: url('assets/avatars/ODE.png');
      background-position: center top;
    }

    .cell--vpl {
      background-image: url('assets/avatars/VPL- Valentin Plumier (3).png');
      background-position: center top;
    }

    .cell--dhe {
      background-image: url('assets/avatars/DHE_Colors.png');
      background-position: center top;
      /* Highlight new member with emerald bottom border */
      border-bottom: 3px solid #1EE8A0;
    }

    .cell--sde {
      background-image: url('assets/avatars/SDE.png');
      background-position: center top;
    }

    .cell--jto {
      background-image: url('assets/avatars/JTO.png');
      background-position: center top;
    }

    /* Text cell */
    .cell--text {
      background: #0D2B1E;
      border: 1px solid rgba(30, 232, 160, 0.2);
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      text-align: center;
      padding: 32px 28px;
    }

    .text-brand {
      font-weight: 800;
      font-size: 22px;
      color: #1EE8A0;
      letter-spacing: 0.04em;
      text-transform: lowercase;
    }

    .text-headline {
      margin-top: 12px;
      font-weight: 600;
      font-size: 18px;
      color: #FFFFFF;
      line-height: 1.35;
    }

    .text-divider {
      margin-top: 8px;
      width: 30px;
      height: 2px;
      background: #1EE8A0;
      border: none;
      flex-shrink: 0;
    }

    .text-name {
      margin-top: 8px;
      font-weight: 700;
      font-size: 16px;
      color: #1EE8A0;
    }

    .text-role {
      margin-top: 3px;
      font-weight: 400;
      font-size: 13px;
      color: rgba(255, 255, 255, 0.4);
    }

    .text-url {
      margin-top: 16px;
      font-weight: 400;
      font-size: 11px;
      color: rgba(255, 255, 255, 0.2);
      letter-spacing: 0.06em;
    }
  </style>
</head>
<body>
  <div class="canvas">
    <div class="team-grid">

      <!-- Row 1 -->
      <div class="cell cell--photo cell--ode"></div>
      <div class="cell cell--photo cell--vpl"></div>
      <div class="cell cell--photo cell--dhe"></div>

      <!-- Row 2 -->
      <div class="cell cell--photo cell--sde"></div>
      <div class="cell cell--photo cell--jto"></div>

      <!-- Text cell — Row 2, Col 3 -->
      <div class="cell cell--text">
        <span class="text-brand">bleen</span>
        <p class="text-headline">L'equipe s'agrandit.</p>
        <hr class="text-divider">
        <span class="text-name">Denis</span>
        <span class="text-role">Graphic Designer</span>
        <span class="text-url">bleen.be</span>
      </div>

    </div>
  </div>
</body>
</html>

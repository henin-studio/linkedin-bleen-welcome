<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=1080">
  <title>Bleen — Denis v6</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;700;800&display=block" rel="stylesheet">
  <style>
    *, *::before, *::after {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    html, body {
      width: 1080px;
      height: 1080px;
      overflow: hidden;
      font-family: 'Plus Jakarta Sans', sans-serif;
    }

    body {
      position: relative;
      background: #0D2B1E;
    }

    /* Noise */
    body::after {
      content: '';
      position: absolute;
      inset: 0;
      background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)'/%3E%3C/svg%3E");
      opacity: 0.03;
      pointer-events: none;
      z-index: 50;
    }

    /* Emerald left panel */
    .panel-left {
      position: absolute;
      top: 0;
      left: 0;
      width: 432px;
      height: 1080px;
      background: #1EE8A0;
    }

    /* Logo */
    .logo {
      position: absolute;
      top: 50px;
      left: 50px;
      font-size: 28px;
      font-weight: 800;
      color: #0D2B1E;
      z-index: 10;
    }

    /* Content — two identical layers, one per zone */
    .text-layer {
      position: absolute;
      top: 0;
      left: 0;
      width: 1080px;
      height: 1080px;
      display: flex;
      flex-direction: column;
      justify-content: center;
      padding-left: 340px;
      gap: 0;
    }

    .text-layer .name {
      font-size: 120px;
      font-weight: 800;
      line-height: 0.9;
      letter-spacing: 0.02em;
      text-transform: uppercase;
    }

    .text-layer .divider {
      width: 60px;
      height: 3px;
      margin: 28px 0 20px;
    }

    .text-layer .role {
      font-size: 22px;
      font-weight: 600;
      letter-spacing: 0.14em;
      text-transform: uppercase;
    }

    /* Left layer — dark green text, clipped to emerald zone */
    .layer-left {
      clip-path: inset(0 648px 0 0);
      z-index: 5;
    }
    .layer-left .name { color: #0D2B1E; }
    .layer-left .divider { background: #0D2B1E; }
    .layer-left .role { color: #0D2B1E; }

    /* Right layer — white/emerald text, clipped to dark zone */
    .layer-right {
      clip-path: inset(0 0 0 432px);
      z-index: 5;
    }
    .layer-right .name { color: #FFFFFF; }
    .layer-right .divider { background: #1EE8A0; }
    .layer-right .role { color: #FFFFFF; }

    /* Bottom labels */
    .joins {
      position: absolute;
      bottom: 50px;
      left: 50px;
      font-size: 13px;
      font-weight: 700;
      color: rgba(13, 43, 30, 0.6);
      letter-spacing: 0.1em;
      text-transform: uppercase;
      z-index: 10;
    }

    .url {
      position: absolute;
      bottom: 50px;
      right: 50px;
      font-size: 14px;
      font-weight: 400;
      color: rgba(255, 255, 255, 0.25);
      z-index: 10;
    }
  </style>
</head>
<body>

  <div class="panel-left"></div>

  <div class="logo">bleen</div>

  <!-- Left zone text (dark on emerald) -->
  <div class="text-layer layer-left">
    <span class="name">DENIS</span>
    <div class="divider"></div>
    <span class="role">Graphic Designer</span>
  </div>

  <!-- Right zone text (white on dark) -->
  <div class="text-layer layer-right">
    <span class="name">DENIS</span>
    <div class="divider"></div>
    <span class="role">Graphic Designer</span>
  </div>

  <span class="joins">rejoint l'equipe</span>
  <span class="url">bleen.be</span>

</body>
</html>

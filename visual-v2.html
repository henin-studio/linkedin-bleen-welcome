<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=1080">
  <title>Bleen — Denis Welcome</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:ital,wght@0,400;0,600;0,700;0,800;1,400&display=block" rel="stylesheet">
  <style>
    *, *::before, *::after {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    html, body {
      width: 1080px;
      height: 1080px;
      overflow: hidden;
      font-family: 'Plus Jakarta Sans', sans-serif;
    }

    .canvas {
      position: relative;
      width: 1080px;
      height: 1080px;
      background: linear-gradient(160deg, #0D2B1E 0%, #145A3A 100%);
      overflow: hidden;
    }

    /* Noise texture overlay */
    .canvas::before {
      content: '';
      position: absolute;
      inset: 0;
      background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)'/%3E%3C/svg%3E");
      opacity: 0.03;
      z-index: 1;
      pointer-events: none;
    }

    /* Decorative circles */
    .circle-tr {
      position: absolute;
      top: -80px;
      right: -80px;
      width: 400px;
      height: 400px;
      border-radius: 50%;
      border: 1px solid rgba(30, 232, 160, 0.08);
      z-index: 2;
    }

    .circle-bl {
      position: absolute;
      bottom: -90px;
      left: -60px;
      width: 300px;
      height: 300px;
      border-radius: 50%;
      border: 1px solid rgba(30, 232, 160, 0.08);
      z-index: 2;
    }

    /* Subtle inner ring on circle-tr for depth */
    .circle-tr::after {
      content: '';
      position: absolute;
      top: 40px;
      left: 40px;
      right: 40px;
      bottom: 40px;
      border-radius: 50%;
      border: 1px solid rgba(30, 232, 160, 0.04);
    }

    /* Logo top-left */
    .logo {
      position: absolute;
      top: 50px;
      left: 50px;
      font-size: 28px;
      font-weight: 800;
      color: #1EE8A0;
      letter-spacing: -0.01em;
      z-index: 10;
    }

    /* URL bottom-right */
    .url {
      position: absolute;
      bottom: 50px;
      right: 50px;
      font-size: 14px;
      font-weight: 400;
      color: rgba(255, 255, 255, 0.25);
      letter-spacing: 0.02em;
      z-index: 10;
    }

    /* Center content */
    .center {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      margin-top: -30px;
      z-index: 10;
    }

    .welcome-phrase {
      font-size: 20px;
      font-weight: 400;
      font-style: italic;
      color: rgba(255, 255, 255, 0.5);
      letter-spacing: 0.01em;
      margin-bottom: 16px;
    }

    /* Emerald glow behind name */
    .name-wrapper {
      position: relative;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .name-wrapper::before {
      content: '';
      position: absolute;
      width: 600px;
      height: 120px;
      background: radial-gradient(ellipse at center, rgba(30, 232, 160, 0.05) 0%, transparent 70%);
      pointer-events: none;
    }

    .name {
      font-size: 72px;
      font-weight: 800;
      color: #FFFFFF;
      letter-spacing: -0.02em;
      line-height: 1;
      position: relative;
      animation: fadeUp 0.7s ease forwards;
      opacity: 0;
    }

    @keyframes fadeUp {
      from {
        opacity: 0;
        transform: translateY(15px);
      }
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    .role {
      margin-top: 20px;
      font-size: 24px;
      font-weight: 600;
      color: #1EE8A0;
      letter-spacing: 0.01em;
    }

    .quote {
      margin-top: 20px;
      font-size: 18px;
      font-weight: 400;
      font-style: italic;
      color: rgba(255, 255, 255, 0.4);
      letter-spacing: 0.01em;
    }
  </style>
</head>
<body>
  <div class="canvas">
    <!-- Noise overlay via ::before -->

    <!-- Decorative circles -->
    <div class="circle-tr"></div>
    <div class="circle-bl"></div>

    <!-- Logo -->
    <div class="logo">bleen</div>

    <!-- Center content -->
    <div class="center">
      <p class="welcome-phrase">Bienvenue dans l'équipe</p>
      <div class="name-wrapper">
        <h1 class="name">Denis</h1>
      </div>
      <p class="role">Graphic Designer</p>
      <p class="quote">Le design au service de la durabilité.</p>
    </div>

    <!-- URL -->
    <div class="url">bleen.be</div>
  </div>
</body>
</html>

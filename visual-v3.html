<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=1080">
  <title>Bleen — Denis Henin</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;700;800&display=block" rel="stylesheet">
  <style>
    *, *::before, *::after {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    html, body {
      width: 1080px;
      height: 1080px;
      overflow: hidden;
      background: #0D2B1E;
      font-family: 'Plus Jakarta Sans', sans-serif;
    }

    body {
      position: relative;
    }

    /* Noise texture overlay */
    body::before {
      content: '';
      position: absolute;
      inset: 0;
      background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)'/%3E%3C/svg%3E");
      opacity: 0.03;
      pointer-events: none;
      z-index: 10;
    }

    /* Radial glow — emerald, left-center, behind text */
    .glow {
      position: absolute;
      top: 50%;
      left: 0;
      transform: translate(-20%, -50%);
      width: 700px;
      height: 700px;
      background: radial-gradient(circle, rgba(30, 232, 160, 0.07) 0%, transparent 70%);
      pointer-events: none;
      z-index: 0;
    }

    /* Vertical accent bar */
    .accent-bar {
      position: absolute;
      left: 60px;
      top: 50%;
      transform: translateY(-50%);
      width: 8px;
      height: 300px;
      background: #1EE8A0;
      border-radius: 4px;
      opacity: 0.15;
      animation: pulse-bar 4s infinite ease-in-out;
      z-index: 1;
    }

    @keyframes pulse-bar {
      0%, 100% { opacity: 0.1; }
      50% { opacity: 0.2; }
    }

    /* Main content block */
    .content {
      position: absolute;
      top: 260px;
      left: 100px;
      z-index: 2;
    }

    .mission-line-1 {
      font-size: 46px;
      font-weight: 700;
      color: #ffffff;
      line-height: 1.15;
      letter-spacing: -0.5px;
    }

    .mission-line-2 {
      font-size: 60px;
      font-weight: 700;
      color: #1EE8A0;
      line-height: 1.15;
      letter-spacing: -0.5px;
      opacity: 1;
      animation: none;
    }

    @keyframes fade-in {
      from { opacity: 0; }
      to { opacity: 1; }
    }

    .divider {
      width: 40px;
      height: 2px;
      background: #1EE8A0;
      margin-top: 40px;
      margin-bottom: 24px;
    }

    .tagline-name {
      font-size: 22px;
      font-weight: 600;
      color: rgba(255, 255, 255, 0.6);
      line-height: 1.5;
    }

    .tagline-role {
      font-size: 22px;
      font-weight: 400;
      color: rgba(255, 255, 255, 0.4);
      line-height: 1.5;
    }

    /* Bottom area */
    .bottom {
      position: absolute;
      bottom: 50px;
      left: 100px;
      right: 50px;
      display: flex;
      align-items: baseline;
      justify-content: space-between;
      z-index: 2;
    }

    .brand {
      font-size: 28px;
      font-weight: 800;
      color: #1EE8A0;
      letter-spacing: -0.5px;
    }

    .website {
      font-size: 14px;
      font-weight: 400;
      color: rgba(255, 255, 255, 0.25);
      letter-spacing: 0.3px;
    }
  </style>
</head>
<body>

  <div class="glow"></div>
  <div class="accent-bar"></div>

  <div class="content">
    <div class="mission-line-1">Rendre la durabilité</div>
    <div class="mission-line-2">visible.</div>

    <div class="divider"></div>

    <div class="tagline-name">Denis Henin rejoint Bleen</div>
    <div class="tagline-role">comme Graphic Designer.</div>
  </div>

  <div class="bottom">
    <div class="brand">bleen</div>
    <div class="website">bleen.be</div>
  </div>

</body>
</html>
